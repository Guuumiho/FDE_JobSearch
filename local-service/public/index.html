<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JD Gallery</title>
    <link rel="stylesheet" href="/assets/gallery.css" />
  </head>
  <body>
    <aside class="sidebar">
      <nav class="nav-list" aria-label="主导航">
        <button class="nav-item active" type="button">
          <span class="nav-icon">⌂</span>
          <span>首页</span>
        </button>
        <button class="nav-item" type="button">
          <span class="nav-icon">◎</span>
          <span>岗位</span>
        </button>
        <button class="nav-item" type="button">
          <span class="nav-icon">✦</span>
          <span>分析</span>
        </button>
        <button class="nav-item" type="button">
          <span class="nav-icon">□</span>
          <span>标签</span>
        </button>
        <button class="nav-item" id="settingsToggle" type="button">
          <span class="nav-icon">⚙</span>
          <span>设置</span>
        </button>
      </nav>

      <section class="settings-panel" id="settingsPanel" aria-label="设置">
        <p class="settings-title">样式</p>
        <div class="style-options" role="group" aria-label="样式选项">
          <button class="style-option active" data-theme="base1" type="button">基础1</button>
          <button class="style-option" data-theme="glass1" type="button">玻璃1</button>
        </div>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="搜索岗位、公司、技能、城市" autocomplete="off" />
          <span class="search-icon">⌕</span>
        </div>
      </header>

      <section class="gallery-shell">
        <div id="status" class="status">正在读取本地岗位库...</div>
        <div id="cardGrid" class="card-grid" aria-live="polite"></div>
      </section>
    </main>

    <dialog id="detailDialog">
      <article class="detail-panel">
        <button id="closeDialog" class="close-button" type="button" aria-label="关闭">×</button>
        <div id="detailContent"></div>
      </article>
    </dialog>

    <script src="/assets/gallery.js"></script>
  </body>
</html>
